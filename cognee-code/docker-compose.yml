# =============================================================================
# Cognee-Code 统一部署 (docker compose)
#
# 五个服务:
#   muninn         — MuninnDB-FAISS 向量数据库 (cognee 存储后端)
#   server         — FastAPI + cognee 核心引擎 + MCP (/mcp/)
#   opencode       — OpenCode serve (AI 执行环境, directory mode)
#   opencode-agent — Bun router (channel 接入 + session 管理)
#   frontend       — Quasar SPA (nginx 静态 + 反向代理)
#
# 连线:
#   opencode-agent → OPENCODE_URL=http://opencode:4096
#   opencode       → 配置 baked 在 cognee-opencode 镜像内
#   server         → VECTOR_DB_URL=http://muninn:8476
#
# 前提:
#   基础镜像已推送到私有仓库 172.16.17.231:5000
#   docker daemon 配置 insecure-registries 包含 172.16.17.231:5000
#   ${DATA_DIR}/ 目录存在或自动创建
#   .env 已配置 MUNINN_VOYAGE_KEY / DEEPSEEK_API_KEY
# =============================================================================

services:

  # ── MuninnDB-FAISS (向量数据库) ────────────────────────────────────────
  muninn:
    container_name: muninndb
    image: 172.16.17.231:5000/muninndb-faiss:latest
    command: --daemon --data /data --listen-host 0.0.0.0
    restart: unless-stopped
    environment:
      - MUNINN_VOYAGE_KEY=${MUNINN_VOYAGE_KEY}
      - MUNINN_SEARCH_BACKEND=bleve
    ports:
      - "8474-8477:8474-8477"
      - "8750:8750"
    networks:
      - cognee-net
    volumes:
      - ${DATA_DIR}/muninn:/data

  # ── Cognee Backend (FastAPI + MCP) ──────────────────────────────────────
  server:
    container_name: cognee-server
    image: 172.16.17.231:5000/cognee-server:latest
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - HOST=0.0.0.0
      - COGNEE_SKIP_CONNECTION_TEST=true
      - VECTOR_DB_URL=http://muninn:8476
    ports:
      - "8000:8000"
    networks:
      - cognee-net
    volumes:
      - ${DATA_DIR}/server:/app/data
    depends_on:
      - muninn

  # ── OpenCode Serve (AI 执行引擎) ──────────────────────────────────────
  opencode:
    container_name: opencode
    image: 172.16.17.231:5000/cognee-opencode:latest
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENCODE_DB_URL=${OPENCODE_DB_URL}
    ports:
      - "4096:4096"
    networks:
      - cognee-net
    volumes:
      - ${DATA_DIR}/work:/work
      - ${DATA_DIR}/opencode:/root/.local/share/opencode

  # ── OpenCode Agent (Channel Router) ─────────────────────────────────────
  opencode-agent:
    container_name: opencode-agent
    image: 172.16.17.231:5000/cognee-agent:latest
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - OPENCODE_URL=http://opencode:4096
      - OPENCODE_ROUTER_CONFIG_PATH=/home/opencode-agent/opencode-router.json
      - OPENCODE_ROUTER_ROOT_DIR=/home/opencode-agent/.opencode-router
      - OPENCODE_ROUTER_HEALTH_HOST=0.0.0.0
      - OPENCODE_DIRECTORY_WORKSPACE_ROOT=/work
    ports:
      - "3005:3005"
    networks:
      - cognee-net
    volumes:
      - ${DATA_DIR}/agent:/home/opencode-agent
      - ${DATA_DIR}/work:/work
      - ./opencode-agent/opencode-router.json:/home/opencode-agent/opencode-router.json:ro
    depends_on:
      - server
      - opencode

  # ── Frontend (Quasar SPA + nginx 反向代理) ─────────────────────────────
  frontend:
    container_name: cognee-frontend
    image: 172.16.17.231:5000/cognee-frontend:latest
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - cognee-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - server
      - opencode-agent

networks:
  cognee-net:
    driver: bridge
