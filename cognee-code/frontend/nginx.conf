# =============================================================================
# nginx 反向代理
#
#  /api/*      → server:8000   (cognee FastAPI REST)
#  /opencode/* → host.docker.internal:4096 (opencode-agent admin proxy)
#  其他        → SPA 静态文件 (Quasar dist/spa)
# =============================================================================

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — 先尝试文件，不存在则回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API + MCP → cognee server
    location /api/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenCode admin proxy → opencode-agent (host network, 需要 extra_hosts)
    location /opencode/ {
        proxy_pass http://host.docker.internal:4096/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / WebSocket 支持
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # Agent management API → opencode-agent health server (host network)
    location /agent-api/ {
        proxy_pass http://host.docker.internal:3005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
